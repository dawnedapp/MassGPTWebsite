<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="360" height="100" viewBox="0 0 360 100" aria-labelledby="title desc" role="img">
  <title id="title">MassGPT logo</title>
  <desc id="desc">A simple circular icon with the MassGPT wordmark.</desc>
  <defs>
    <linearGradient id="g" x1="0" x2="1">
      <stop offset="0%" stop-color="#6C5CE7" />
      <stop offset="100%" stop-color="#00B894" />
    </linearGradient>
    <style>
      .word { font-family: Inter, Arial, Helvetica, sans-serif; font-weight:700; font-size:32px; fill:#0f1724 }
      .sub { font-size:12px; fill:#4b5563 }
    </style>
  </defs>

  <!-- icon -->
  <g transform="translate(18,18)">
    <circle cx="32" cy="32" r="32" fill="url(#g)" />
    <g transform="translate(12,12)">
      <path d="M8 2a6 6 0 1 0 0 12 6 6 0 0 0 0-12z" fill="rgba(255,255,255,0.12)"/>
      <path d="M16 4c-3 0-6 1-8 3 2-1 5-2 8-2 6 0 10 4 10 10 0 3-1 6-3 8 2-2 3-5 3-8 0-6-4-10-10-10z" fill="rgba(255,255,255,0.18)"/>
    </g>
  </g>

  <!-- wordmark -->
  <g transform="translate(92,60)">
    <text class="word">MassGPT</text>
  </g>

  <!-- tagline (optional) -->
  <g transform="translate(92,82)">
    <text class="sub">AI summarization & workspace tools</text>
  </g>
</svg>